<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>SOLTAR</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0A0A0A;--white:#F5F5F5;--accent:#E8FF00;--gray1:#141414;--gray2:#1E1E1E;--gray3:#2A2A2A;--gray4:#444;--gray5:#888;--gray6:#BBB}
body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;width:100%;overflow-x:hidden}
#shell{width:100%;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--black)}
#main-content{padding:0 0 80px;flex:1}
input,button{font-family:'Barlow',sans-serif}
input{color:var(--white)}
input::placeholder{color:var(--gray4)}
button{cursor:pointer}

/* JOIN */
#join-screen{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;background:var(--black);width:100%;position:relative;overflow:hidden}
.join-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1501854140801-50d01698950b?w=800&q=60') center/cover no-repeat;opacity:.18}
.join-content{position:relative;padding:40px 24px 56px;display:flex;flex-direction:column;gap:20px}
.join-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
.join-logo{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:900;line-height:.9;text-transform:uppercase;color:var(--white);letter-spacing:-.02em}
.join-sub{font-size:14px;color:var(--gray5);line-height:1.6;max-width:280px}
.join-meta{font-size:12px;color:var(--gray4);margin-top:-8px}

/* HEADER */
#app-header{background:var(--black);border-bottom:1px solid var(--gray2);position:sticky;top:0;z-index:100}
.header-inner{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:var(--white)}
.me-chip{display:flex;align-items:center;gap:6px;border:1px solid var(--gray3);border-radius:2px;padding:5px 10px;font-size:12px;max-width:55%}
.me-name{color:var(--gray6);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.me-points{color:var(--accent);font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:14px;flex-shrink:0}

/* NAV */
#app-nav{display:flex;border-bottom:1px solid var(--gray2);background:var(--black)}
.nav-btn{background:transparent;border:none;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:13px 0;flex:1;border-bottom:2px solid transparent;transition:all .2s;color:var(--gray4);font-family:'Barlow',sans-serif}
.nav-btn.active{border-bottom-color:var(--accent);color:var(--white)}

/* SECTION LABEL */
.sec-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gray4);padding:20px 16px 8px}

/* TRIP CARDS — CONFIRMED */
.trip-card{border-bottom:1px solid var(--gray2);padding:16px;transition:background .15s}
.trip-card.confirmed{background:var(--gray1)}
.trip-card.suggestion{background:var(--black)}
.trip-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.trip-emoji{font-size:24px;flex-shrink:0;margin-top:1px}
.trip-name{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;color:var(--white);line-height:1}
.trip-dest{font-size:12px;color:var(--gray5);margin-top:3px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.trip-dates{font-size:12px;color:var(--gray4);margin-top:2px}
.trip-days-left{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:3px}
.badge-confirmed{background:var(--accent);color:var(--black);border-radius:2px;font-size:9px;font-weight:800;padding:3px 7px;flex-shrink:0;white-space:nowrap;letter-spacing:.1em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}
.badge-voting{border:1px solid var(--gray3);color:var(--gray5);border-radius:2px;font-size:9px;font-weight:700;padding:3px 7px;flex-shrink:0;white-space:nowrap;letter-spacing:.08em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}
.trip-avatars{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;font-size:18px}

/* PROGRESS BAR */
.prog-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.prog-bg{flex:1;height:2px;background:var(--gray3);overflow:hidden}
.prog-fill{height:100%;background:var(--accent);transition:width .4s}
.prog-label{font-size:11px;color:var(--gray5);flex-shrink:0;font-weight:600}

/* BUTTONS */
.btn-confirm{width:100%;background:var(--white);color:var(--black);border:none;border-radius:2px;padding:12px;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;font-family:'Barlow',sans-serif}
.btn-confirm.done{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn-vote{width:100%;background:transparent;color:var(--white);border:1px solid var(--gray3);border-radius:2px;padding:12px;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:'Barlow',sans-serif}
.btn-vote.done{color:var(--accent);border-color:var(--accent)}

/* TRIP ACTIONS */
.trip-actions{display:flex;gap:8px;margin-top:6px}
.btn-edit{flex:1;background:transparent;color:var(--gray5);border:1px solid var(--gray3);border-radius:2px;padding:8px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.btn-delete{flex:1;background:transparent;color:#FF4444;border:1px solid rgba(255,68,68,.25);border-radius:2px;padding:8px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}

/* BUDGET */
.budget-block{background:var(--gray2);border-radius:2px;padding:12px;margin-bottom:10px;display:flex;flex-direction:column;gap:5px}
.budget-header{display:flex;justify-content:space-between;align-items:center}
.budget-lbl{font-size:10px;color:var(--gray5);font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.budget-amt{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--accent)}
.budget-row{display:flex;justify-content:space-between;font-size:12px}
.budget-hint{font-size:11px;color:var(--gray4);margin-top:2px}

/* IDEAS */
.ideas-section{border-top:1px solid var(--gray2);padding-top:10px;margin-top:4px}
.idea-row{background:var(--gray2);border-radius:2px;padding:9px 11px;margin-bottom:5px}
.idea-text{font-size:13px;color:var(--gray6);margin-bottom:5px}
.idea-meta{display:flex;justify-content:space-between;align-items:center}
.like-btn{background:transparent;border:1px solid var(--gray3);border-radius:2px;padding:2px 8px;font-size:12px;color:var(--gray5)}
.like-btn.active{border-color:#FF4D8F;color:#FF4D8F}

/* COUNTDOWN STRIP */
.countdown-strip{margin:0;padding:24px 16px;background:var(--gray1);border-top:1px solid var(--gray2);position:relative;overflow:hidden}
.cs-eyebrow{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gray4);margin-bottom:4px;font-family:'Barlow Condensed',sans-serif}
.cs-number{font-family:'Barlow Condensed',sans-serif;font-size:96px;font-weight:900;color:var(--accent);line-height:.85;letter-spacing:-.03em}
.cs-unit{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--gray5);margin-top:4px}
.cs-name{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;text-transform:uppercase;color:var(--white);margin-top:8px;letter-spacing:.02em}
.cs-dest{font-size:12px;color:var(--gray5);margin-top:2px;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.cs-dates{font-size:12px;color:var(--gray4);margin-top:2px}
.cs-budget{font-size:12px;color:var(--gray5);margin-top:8px;padding-top:8px;border-top:1px solid var(--gray3)}

/* WHO FALTA */
.who-strip{padding:12px 16px;background:var(--gray1);border-bottom:1px solid var(--gray2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.who-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray4);flex-shrink:0}
.who-chip{display:flex;align-items:center;gap:4px;border:1px solid var(--gray3);border-radius:2px;padding:3px 8px;font-size:12px;color:var(--gray5)}

/* HYPE */
.hype-strip{padding:12px 16px;background:var(--black);border-bottom:1px solid var(--gray2);display:flex;align-items:center;gap:10px}
.hype-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray4);flex-shrink:0}
.hype-bar-bg{flex:1;height:2px;background:var(--gray3);overflow:hidden}
.hype-bar-fill{height:100%;background:var(--accent);transition:width .8s ease}
.hype-pct{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--accent);flex-shrink:0}

/* PROPOSE BTN */
.propose-btn-wrap{padding:12px 16px;border-bottom:1px solid var(--gray2)}

/* PHOTOS */
.upload-area{margin:16px;border:1px dashed var(--gray3);border-radius:2px;padding:20px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px}
.photo-card{margin:0 16px 1px;position:relative;overflow:hidden}
.photo-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;filter:brightness(.9)}
.photo-overlay{position:absolute;bottom:0;left:0;right:0;padding:10px 12px;background:linear-gradient(transparent,rgba(0,0,0,.7))}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--gray2)}
.lb-row.first{background:var(--gray1)}
.lb-row.me{border-left:2px solid var(--accent)}
.cagon-tag{font-size:10px;color:#FF4444;margin-top:1px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}

/* FORMS */
.empty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:48px 16px;color:var(--gray4);text-align:center;font-size:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal-card{background:var(--gray1);border-top:1px solid var(--gray3);padding:20px 20px 40px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;max-height:88vh;overflow-y:auto}
.modal-handle{width:32px;height:3px;background:var(--gray3);border-radius:2px;margin:0 auto 6px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--white)}
.input-wrap{display:flex;flex-direction:column;gap:6px}
.input-label{font-size:10px;color:var(--gray4);font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.app-input{background:var(--gray2);border:1px solid var(--gray3);border-radius:2px;padding:12px 14px;color:var(--white);font-size:14px;outline:none;width:100%;transition:border-color .2s}
.app-input:focus{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:var(--black);border:none;border-radius:2px;padding:13px 20px;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.btn-cancel{background:transparent;color:var(--gray5);border:1px solid var(--gray3);border-radius:2px;padding:13px 16px;font-size:13px;font-weight:600}
.btn-small{background:transparent;color:var(--accent);border:1px solid var(--gray3);border-radius:2px;padding:4px 10px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.btn-tiny{background:var(--gray2);color:var(--gray5);border:none;border-radius:2px;padding:3px 8px;font-size:14px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.date-row{display:flex;gap:8px}
.date-row .input-wrap{flex:1;min-width:0}
.pts-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;padding:0 16px}
.pt-chip{border:1px solid var(--gray3);border-radius:2px;padding:5px 10px;font-size:11px;color:var(--gray5);font-weight:600;letter-spacing:.04em}
</style>
</head>
<body>

<!-- JOIN -->
<div id="join-screen" style="display:none">
  <div class="join-bg"></div>
  <div class="join-content">
    <div class="join-eyebrow">El grupo que siempre viaja</div>
    <div class="join-logo">SOL<br/>TAR</div>
    <div class="join-sub">Organizá los viajes con tu grupo. Votá destinos, confirmá fechas, compartí fotos.</div>
    <input class="app-input" id="name-input" placeholder="Tu nombre"/>
    <button class="btn-primary" id="join-btn">ENTRAR →</button>
    <div class="join-meta" id="join-meta">Sé el primero</div>
  </div>
</div>

<!-- SHELL -->
<div id="shell" style="display:none">
  <div id="app-header">
    <div class="header-inner">
      <span class="logo">SOLTAR</span>
      <div class="me-chip">
        <span id="hdr-avatar"></span>
        <span class="me-name" id="hdr-name"></span>
        <span class="me-points" id="hdr-points">✦0</span>
        <span id="hdr-cagon"></span>
      </div>
    </div>
  </div>
  <nav id="app-nav">
    <button class="nav-btn active" data-tab="trips">Viajes</button>
    <button class="nav-btn" data-tab="muro">Muro</button>
    <button class="nav-btn" data-tab="ranking">Ranking</button>
  </nav>
  <div id="main-content"></div>
</div>

<div id="modal-container"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyC8zEUTsRaP_KUQyfLFe1KTkAZ43HKbEH8",authDomain:"soltar-3d0d5.firebaseapp.com",projectId:"soltar-3d0d5",storageBucket:"soltar-3d0d5.firebasestorage.app",messagingSenderId:"625459520261",appId:"1:625459520261:web:9eab932b7d1da90e6d8d6c"};
const db=getFirestore(initializeApp(firebaseConfig));

async function loadState(){try{const s=await getDoc(doc(db,"soltar","state"));return s.exists()?s.data().value:null;}catch(e){return null;}}
async function saveState(s){try{await setDoc(doc(db,"soltar","state"),{value:s});}catch(e){console.error(e);}}

const AVATARS=["🦁","🐺","🦊","🐻","🦝","🦄","🐸","🦋","🐬","🦜"];
function uid(){let id=localStorage.getItem("soltar-uid");if(!id){id=Math.random().toString(36).slice(2,10);localStorage.setItem("soltar-uid",id);}return id;}
function ava(){let a=localStorage.getItem("soltar-avatar");if(!a){a=AVATARS[Math.floor(Math.random()*AVATARS.length)];localStorage.setItem("soltar-avatar",a);}return a;}
const myId=uid(),myAvatar=ava();
let myName=localStorage.getItem("soltar-name")||"";

function daysUntil(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);}
function hypeScore(trip,members){if(!trip)return 0;const c=Object.values(trip.confirmed||{}).filter(Boolean).length;return Math.round((c/Math.max(Object.keys(members).length,1))*100);}
function monthlySavings(b,d){if(!b||!d)return null;const m=(new Date(d)-new Date())/(86400000*30.44);return m<=0?null:Math.ceil(b/m);}
function defaultState(){return{members:{},trips:[],tripIdeas:{},muro:[],voteLog:{}};}
function fmt(d){if(!d)return"";const[y,m,day]=d.split("-");return`${day}/${m}`;}
function fmtFull(d){if(!d)return"";const[y,m,day]=d.split("-");return`${day}/${m}/${y.slice(2)}`;}
function tripDisplay(t){if(t.dateFrom&&t.dateTo)return`${fmt(t.dateFrom)} → ${fmt(t.dateTo)}`;if(t.dateFrom)return fmtFull(t.dateFrom);return fmtFull(t.date||"");}
function tripStart(t){return t.dateFrom||t.date||"";}

let STATE=null,currentTab="trips",showAddTrip=false,showAddIdea=null,editingTrip=null;
let newTrip={name:"",dest:"",dateFrom:"",dateTo:"",emoji:"✈️",budget:""};
let lastHash="";

function renderHeader(){
  if(!STATE||!myName)return;
  const me=STATE.members[myId]||{name:myName,avatar:myAvatar,points:0};
  document.getElementById("hdr-avatar").textContent=me.avatar;
  document.getElementById("hdr-name").textContent=me.name;
  document.getElementById("hdr-points").textContent=`✦${me.points||0}`;
  document.getElementById("hdr-cagon").textContent=me.cagon?"👻":"";
}

function renderMain(){
  if(!STATE||!myName)return;
  const trips=STATE.trips||[];
  const confirmed=trips.filter(t=>t.status==="confirmed").sort((a,b)=>new Date(tripStart(a))-new Date(tripStart(b)));
  const suggestions=trips.filter(t=>t.status==="suggestion").sort((a,b)=>Object.values(b.confirmed||{}).filter(Boolean).length-Object.values(a.confirmed||{}).filter(Boolean).length);
  let html="";
  if(currentTab==="trips")html=buildTrips(confirmed,suggestions);
  else if(currentTab==="muro")html=buildMuro();
  else if(currentTab==="ranking")html=buildRanking();
  document.getElementById("main-content").innerHTML=html;
  bindMainEvents();
}

function renderModal(){
  document.getElementById("modal-container").innerHTML=(showAddTrip||editingTrip)?buildModal():"";
  if(showAddTrip||editingTrip)bindModalEvents();
}

function refresh(){renderHeader();renderMain();renderModal();}

document.querySelectorAll(".nav-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentTab=btn.dataset.tab;
    showAddIdea=null;
    renderMain();
  });
});

// ── TRIPS TAB ─────────────────────────────────────────────────────────────────
function buildTrips(confirmed,suggestions){
  const next=confirmed[0]||null;
  const hype=hypeScore(next,STATE.members);
  const whoFalta=Object.entries(STATE.members).filter(([id])=>!(STATE.voteLog[id]||[]).length&&!(STATE.trips||[]).some(t=>t.confirmed?.[id])&&id!==myId);

  let html="";

  // Hype bar
  if(next&&Object.keys(STATE.members).length>1){
    html+=`<div class="hype-strip">
      <span class="hype-label">Hype</span>
      <div class="hype-bar-bg"><div class="hype-bar-fill" style="width:${hype}%"></div></div>
      <span class="hype-pct">${hype}%</span>
    </div>`;
  }

  // Who's missing
  if(whoFalta.length){
    html+=`<div class="who-strip">
      <span class="who-label">Sin actividad</span>
      ${whoFalta.map(([id,m])=>`<div class="who-chip">${m.avatar} ${m.name}</div>`).join("")}
    </div>`;
  }

  // Propose button
  html+=`<div class="propose-btn-wrap">
    <button class="btn-primary" style="width:100%" data-action="show-add-trip">+ PROPONER VIAJE</button>
  </div>`;

  // Confirmed trips
  if(confirmed.length){
    html+=`<div class="sec-label">Confirmados</div>`;
    html+=confirmed.map(t=>buildTripCard(t,"confirmed")).join("");
  }

  // Suggestions
  if(suggestions.length){
    html+=`<div class="sec-label">En votación</div>`;
    html+=suggestions.map(t=>buildTripCard(t,"suggestion")).join("");
  }

  if(!confirmed.length&&!suggestions.length){
    html+=`<div class="empty"><span style="font-size:40px">🌍</span><span style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:.05em;text-transform:uppercase">Ningún viaje todavía</span><span style="color:var(--gray4);font-size:13px">Proponé el primero</span></div>`;
  }

  // Countdown strip at bottom
  if(next){
    const days=daysUntil(tripStart(next));
    const monthly=monthlySavings(next.budget,tripStart(next));
    html+=`<div class="countdown-strip">
      <div class="cs-eyebrow">Próximo destino</div>
      <div class="cs-number">${days!==null?(days<=0?"0":days):"—"}</div>
      <div class="cs-unit">${days===1?"día":"días"}</div>
      <div class="cs-name">${next.emoji} ${next.name}</div>
      <div class="cs-dest">📍 ${next.dest}</div>
      <div class="cs-dates">${tripDisplay(next)}</div>
      ${next.budget?`<div class="cs-budget">💰 USD ${next.budget.toLocaleString()} p/persona${monthly?` · ~$${monthly}/mes para llegar`:""}</div>`:""}
    </div>`;
  }

  return html;
}

// ── TRIP CARD ─────────────────────────────────────────────────────────────────
function buildTripCard(trip,type){
  const count=Object.values(trip.confirmed||{}).filter(Boolean).length;
  const myConf=trip.confirmed?.[myId];
  const days=daysUntil(tripStart(trip));
  const isConf=type==="confirmed";
  return`<div class="trip-card ${type}">
    <div class="trip-top">
      <span class="trip-emoji">${trip.emoji}</span>
      <div style="flex:1;min-width:0">
        <div class="trip-name">${trip.name}</div>
        <div class="trip-dest">${trip.dest}</div>
        <div class="trip-dates">${tripDisplay(trip)}</div>
        ${isConf&&days!==null?`<div class="trip-days-left">${days<=0?"¡YA LLEGÓ!":days===1?"¡MAÑANA!":`${days} DÍAS`}</div>`:""}
      </div>
      <span class="${isConf?"badge-confirmed":"badge-voting"}">${isConf?"OK":`${count}/5`}</span>
    </div>
    ${!isConf?`<div class="prog-wrap"><div class="prog-bg"><div class="prog-fill" style="width:${Math.min((count/5)*100,100)}%"></div></div><span class="prog-label">${count}/5</span></div>`:""}
    <div class="trip-avatars">${Object.entries(trip.confirmed||{}).filter(([,v])=>v).map(([id])=>`<span title="${STATE.members[id]?.name||""}">${STATE.members[id]?.avatar||"👤"}</span>`).join("")}${Object.entries(STATE.members).filter(([id,m])=>m.cagon&&m.cagonTrip===trip.id).map(()=>`<span style="opacity:.3">👻</span>`).join("")}</div>
    <button class="btn-confirm${myConf?" done":""}" data-action="${isConf?"confirm-trip":"vote-trip"}" data-trip="${trip.id}">
      ${myConf?(isConf?"BAJARME DEL VIAJE":"✓ CONFIRMADO"):(isConf?"CONFIRMARME (+10 si sos el 1ro)":"CONFIRMARME (+1PT)")}
    </button>
    ${buildBudget(trip)}
    <div class="ideas-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:10px;color:var(--gray4);font-weight:700;letter-spacing:.12em;text-transform:uppercase">Ideas & planes</span>
        <button class="btn-tiny" data-action="show-idea" data-trip="${trip.id}">+</button>
      </div>
      ${buildIdeas(trip.id)}
      ${showAddIdea===trip.id?buildIdeaInput(trip.id):""}
    </div>
    <div class="trip-actions">
      <button class="btn-edit" data-action="edit-trip" data-trip="${trip.id}">✏️ EDITAR</button>
      <button class="btn-delete" data-action="delete-trip" data-trip="${trip.id}">🗑️ BORRAR</button>
    </div>
  </div>`;
}

function buildBudget(trip){
  if(!trip?.budget)return"";
  const monthly=monthlySavings(trip.budget,tripStart(trip));
  const days=daysUntil(tripStart(trip));
  const weekly=monthly?Math.ceil(monthly/4.33):null;
  const urgent=days!==null&&days<60;
  return`<div class="budget-block">
    <div class="budget-header"><span class="budget-lbl">Presupuesto p/persona</span><span class="budget-amt">$${trip.budget.toLocaleString()} USD</span></div>
    ${monthly?`<div class="budget-row"><span style="color:var(--gray5);font-size:12px">Por mes</span><span style="color:var(--white);font-size:12px;font-weight:600">$${monthly} USD</span></div>
    <div class="budget-row"><span style="color:var(--gray5);font-size:12px">Por semana</span><span style="color:var(--gray4);font-size:12px">$${weekly} USD</span></div>
    <div class="budget-hint">${urgent?"🔥 Queda poco — guardá ya":"Empezá a ahorrar"}</div>`:""}
  </div>`;
}

function buildIdeas(tripId){
  const ideas=STATE.tripIdeas?.[tripId]||[];
  if(!ideas.length)return`<div style="font-size:12px;color:var(--gray4);padding:4px 0">Sin ideas todavía</div>`;
  return ideas.map(idea=>{
    const likes=Object.values(idea.likes||{}).filter(Boolean).length;
    const myLike=idea.likes?.[myId];
    return`<div class="idea-row"><div class="idea-text">${idea.text}</div><div class="idea-meta"><span style="font-size:11px;color:var(--gray4)">${STATE.members[idea.uid]?.avatar||""} ${STATE.members[idea.uid]?.name||""}</span><button class="like-btn${myLike?" active":""}" data-action="like-idea" data-trip="${tripId}" data-idea="${idea.id}">❤️ ${likes}</button></div></div>`;
  }).join("");
}

function buildIdeaInput(tripId){
  return`<div style="margin-top:8px;display:flex;flex-direction:column;gap:8px">
    <input class="app-input" id="idea-input" placeholder="Tu idea, plan o detalle..."/>
    <div class="modal-btns"><button class="btn-cancel" style="padding:9px 12px;font-size:12px" data-action="cancel-idea">Cancelar</button><button class="btn-primary" style="padding:9px 14px;font-size:12px" data-action="submit-idea" data-trip="${tripId}">Agregar</button></div>
  </div>`;
}

// ── MURO ─────────────────────────────────────────────────────────────────────
function buildMuro(){
  const posts=(STATE.muro||[]).slice().reverse();
  return`<div class="sec-label">Muro del grupo</div>
  <div style="padding:0 16px 14px">
    <textarea class="app-input" id="muro-input" placeholder="Escribí algo al grupo..." rows="2" style="resize:none;line-height:1.5"></textarea>
    <button class="btn-primary" style="width:100%;margin-top:8px" data-action="post-muro">PUBLICAR</button>
  </div>
  ${!posts.length?`<div class="empty"><span style="font-size:32px">💬</span><span style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.05em;text-transform:uppercase">Nada todavía</span><span style="color:var(--gray4);font-size:13px">Sé el primero en escribir algo</span></div>`:""}
  ${posts.map(p=>{
    const me=STATE.members[p.uid];
    const d=new Date(p.ts);
    const timeStr=`${d.getDate()}/${d.getMonth()+1} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    return`<div style="border-bottom:1px solid var(--gray2);padding:14px 16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
        <span style="font-size:20px">${me?.avatar||"👤"}</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--white)">${me?.name||"Alguien"}</span>
        <span style="font-size:11px;color:var(--gray4);margin-left:auto">${timeStr}</span>
        ${p.uid===myId?`<button style="background:transparent;border:none;color:var(--gray4);font-size:12px;padding:0 2px" data-action="delete-post" data-post="${p.id}">✕</button>`:""}
      </div>
      <div style="font-size:14px;color:var(--gray6);line-height:1.5">${p.text}</div>
    </div>`;
  }).join("")}`;
}

// ── RANKING ───────────────────────────────────────────────────────────────────
function buildRanking(){
  const lb=Object.entries(STATE.members).sort((a,b)=>(b[1].points||0)-(a[1].points||0));
  return`<div class="sec-label">Ranking</div>
  <div class="pts-chips">
    <span class="pt-chip">✈️ 1ro en confirmar +10</span>
    <span class="pt-chip">🗳️ Votar sugerencia +1</span>
  </div>
  ${lb.map(([id,m],i)=>`<div class="lb-row${i===0?" first":""}${id===myId?" me":""}">
    <div style="width:24px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:${i===0?"var(--accent)":"var(--gray4)"};flex-shrink:0">${i===0?"01":i===1?"02":i===2?"03":`0${i+1}`}</div>
    <div style="font-size:22px;flex-shrink:0">${m.avatar}</div>
    <div style="flex:1;min-width:0">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.name}${id===myId?" (VOS)":""}</div>
      ${m.cagon?`<div class="cagon-tag">👻 CAGÓN</div>`:""}
    </div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:var(--accent);flex-shrink:0">${m.points||0}</div>
  </div>`).join("")}`;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function buildModal(){
  const editing=!!editingTrip;
  const t=editing?editingTrip:newTrip;
  return`<div class="modal-overlay" id="modal-overlay">
    <div class="modal-card">
      <div class="modal-handle"></div>
      <div class="modal-title">${editing?"Editar viaje":"Proponer viaje"}</div>
      <div class="input-wrap"><label class="input-label">Nombre</label><input class="app-input" data-field="name" placeholder="Ej: Fin de semana largo" value="${t.name||""}"/></div>
      <div class="input-wrap"><label class="input-label">Destino</label><input class="app-input" data-field="dest" placeholder="Ej: Mendoza" value="${t.dest||""}"/></div>
      <div class="date-row">
        <div class="input-wrap"><label class="input-label">Ida</label><input class="app-input" data-field="dateFrom" type="date" value="${t.dateFrom||""}"/></div>
        <div class="input-wrap"><label class="input-label">Vuelta</label><input class="app-input" data-field="dateTo" type="date" value="${t.dateTo||""}"/></div>
      </div>
      <div class="input-wrap"><label class="input-label">Emoji</label><input class="app-input" data-field="emoji" placeholder="✈️" value="${t.emoji||"✈️"}"/></div>
      <div class="input-wrap"><label class="input-label">Presupuesto p/persona (USD)</label><input class="app-input" data-field="budget" type="number" placeholder="Ej: 500" value="${t.budget||""}"/></div>
      <div class="modal-btns">
        <button class="btn-cancel" data-action="cancel-modal">Cancelar</button>
        <button class="btn-primary" data-action="${editing?"update-trip":"submit-trip"}">${editing?"GUARDAR":"PROPONER"}</button>
      </div>
    </div>
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
function bindMainEvents(){
  document.querySelectorAll("#main-content [data-action]").forEach(el=>el.addEventListener("click",handleAction));
}

function bindModalEvents(){
  const fields=editingTrip||newTrip;
  document.querySelectorAll("#modal-container [data-field]").forEach(input=>{
    input.addEventListener("input",e=>{fields[e.target.dataset.field]=e.target.value;});
  });
  document.querySelectorAll("#modal-container [data-action]").forEach(el=>el.addEventListener("click",handleAction));
  document.getElementById("modal-overlay")?.addEventListener("click",e=>{if(e.target.id==="modal-overlay")closeModal();});
}

function closeModal(){showAddTrip=false;editingTrip=null;newTrip={name:"",dest:"",dateFrom:"",dateTo:"",emoji:"✈️",budget:""};renderModal();}

function handleAction(){
  const action=this.dataset.action,tripId=this.dataset.trip,ideaId=this.dataset.idea;
  if(action==="post-muro"){
    const text=document.getElementById("muro-input")?.value.trim()||"";
    if(!text)return;
    update(s=>{if(!s.muro)s.muro=[];s.muro.push({id:Date.now().toString(36),text,uid:myId,ts:Date.now()});return s;});
  }
  else if(action==="delete-post"){
    const postId=this.dataset.post;
    update(s=>{s.muro=(s.muro||[]).filter(p=>p.id!==postId);return s;});
  }
  else if(action==="show-add-trip"){showAddTrip=true;editingTrip=null;renderModal();}
  else if(action==="cancel-modal")closeModal();
  else if(action==="submit-trip"){
    if(!newTrip.name.trim()||!newTrip.dest.trim()||!newTrip.dateFrom)return;
    const id=Date.now().toString(36);
    update(s=>{s.trips.push({id,name:newTrip.name.trim(),dest:newTrip.dest.trim(),dateFrom:newTrip.dateFrom,dateTo:newTrip.dateTo,emoji:newTrip.emoji||"✈️",budget:newTrip.budget?parseFloat(newTrip.budget):null,confirmed:{},status:"suggestion",proposedBy:myId});if(!s.tripIdeas[id])s.tripIdeas[id]=[];return s;});
    closeModal();
  }
  else if(action==="edit-trip"){
    const trip=STATE.trips.find(t=>t.id===tripId);if(!trip)return;
    editingTrip={...trip};showAddTrip=false;renderModal();
  }
  else if(action==="update-trip"){
    if(!editingTrip?.name.trim()||!editingTrip?.dest.trim())return;
    update(s=>{const idx=s.trips.findIndex(t=>t.id===editingTrip.id);if(idx>=0)s.trips[idx]={...s.trips[idx],name:editingTrip.name.trim(),dest:editingTrip.dest.trim(),dateFrom:editingTrip.dateFrom,dateTo:editingTrip.dateTo,emoji:editingTrip.emoji||"✈️",budget:editingTrip.budget?parseFloat(editingTrip.budget):null};return s;});
    closeModal();
  }
  else if(action==="delete-trip"){
    if(!confirm("¿Borrar este viaje?"))return;
    update(s=>{s.trips=s.trips.filter(t=>t.id!==tripId);delete s.tripIdeas[tripId];return s;});
  }
  else if(action==="show-idea"){showAddIdea=tripId;renderMain();}
  else if(action==="cancel-idea"){showAddIdea=null;renderMain();}
  else if(action==="submit-idea"){
    const text=document.getElementById("idea-input")?.value.trim()||"";
    if(!text)return;
    update(s=>{if(!s.tripIdeas[tripId])s.tripIdeas[tripId]=[];s.tripIdeas[tripId].push({id:Date.now().toString(36),text,uid:myId,likes:{}});return s;});
    showAddIdea=null;
  }
  else if(action==="like-idea"){update(s=>{const idea=s.tripIdeas[tripId]?.find(i=>i.id===ideaId);if(idea)idea.likes[myId]=!idea.likes[myId];return s;});}
  else if(action==="confirm-trip")doConfirm(tripId);
  else if(action==="vote-trip")doVote(tripId);
}

function doConfirm(tripId){
  update(s=>{
    const trip=s.trips.find(t=>t.id===tripId);if(!trip)return s;
    if(!trip.confirmed[myId]){
      trip.confirmed[myId]=true;
      const total=Object.values(trip.confirmed).filter(Boolean).length;
      if(total===1)s.members[myId].points=(s.members[myId].points||0)+10;
      if(s.members[myId].cagonTrip===tripId){s.members[myId].cagon=false;s.members[myId].cagonTrip=null;}
      if(total>=5&&trip.status==="suggestion")trip.status="confirmed";
    }else{
      trip.confirmed[myId]=false;
      if(trip.status==="confirmed"){s.members[myId].cagon=true;s.members[myId].cagonTrip=tripId;}
    }
    return s;
  });
}

function doVote(tripId){
  update(s=>{
    const log=s.voteLog[myId]||[];if(log.includes(tripId))return s;
    s.voteLog[myId]=[...log,tripId];
    s.members[myId].points=(s.members[myId].points||0)+1;
    return s;
  });
  doConfirm(tripId);
}

function update(fn){
  STATE=fn(JSON.parse(JSON.stringify(STATE)));
  lastHash=JSON.stringify(STATE);
  saveState(STATE);
  refresh();
}

document.getElementById("join-btn").addEventListener("click",doJoin);
document.getElementById("name-input").addEventListener("keydown",e=>{if(e.key==="Enter")doJoin();});
function doJoin(){
  const name=document.getElementById("name-input").value.trim();if(!name)return;
  myName=name;localStorage.setItem("soltar-name",name);
  update(s=>{if(!s.members[myId])s.members[myId]={name,avatar:myAvatar,points:0,cagon:false,cagonTrip:null};return s;});
  document.getElementById("join-screen").style.display="none";
  document.getElementById("shell").style.display="flex";
}

async function init(){
  let s=await loadState();
  STATE=s||defaultState();
  lastHash=JSON.stringify(STATE);
  if(myName&&!STATE.members[myId]){STATE.members[myId]={name:myName,avatar:myAvatar,points:0,cagon:false,cagonTrip:null};saveState(STATE);}
  if(myName){
    document.getElementById("join-screen").style.display="none";
    document.getElementById("shell").style.display="flex";
    refresh();
  }else{
    document.getElementById("join-screen").style.display="flex";
    const count=Object.keys(STATE.members).length;
    document.getElementById("join-meta").textContent=count>0?`${count} persona${count>1?"s":""} ya adentro`:"Sé el primero";
  }
}
init();

setInterval(async()=>{
  if(document.activeElement&&["INPUT","TEXTAREA"].includes(document.activeElement.tagName))return;
  const s=await loadState();if(!s)return;
  const hash=JSON.stringify(s);
  if(hash!==lastHash){lastHash=hash;STATE=s;refresh();}
},7000);
</script>
</body>
</html>
